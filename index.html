<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kanban + Table</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#11142a;--lane:#30334f;--card:#171a32;--text:#f7f7fb;--muted:#aab0c6;--border:#3d415f;--blue:#0f6fc2;--orange:#d98a1f;--red:#c13f5c;--green:#1fa86e;--cyan:#1f7fa3;--purple:#7e4db3;--gray:#8a8a8a}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial, sans-serif}
.app{padding:14px;transform:scale(.9);transform-origin:top left;width:111%}
.header{display:flex;justify-content:space-between;border-bottom:1px solid var(--border)}
h1{margin:0 0 8px;font-size:22px}.sub{font-size:12px;color:var(--muted);margin-bottom:8px}
.tabs{display:flex;gap:20px}.tab{background:none;border:0;color:var(--text);padding:8px 0;cursor:pointer}.tab.active{border-bottom:3px solid var(--blue)}
.toolbar{display:flex;gap:10px;padding:15px 0;flex-wrap:wrap;align-items:center}
button,input,select,textarea{background:#252944;color:white;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:12px;font-family:inherit}
textarea{min-height:64px;resize:vertical}.new-btn{background:var(--blue)!important}.sync-ok{color:var(--green);font-size:12px}.sync-bad{color:var(--red);font-size:12px}
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px}.lane{min-width:220px;background:var(--lane);border-radius:8px;overflow:hidden}.lane.drag-over{outline:2px dashed var(--blue);outline-offset:-6px;background:#3a3e5f}.lane-header{padding:10px;font-weight:bold;color:white}.lane-body{padding:10px;min-height:520px}
.card{background:var(--card);padding:8px;border-radius:6px;margin-bottom:8px;cursor:grab;box-shadow:0 4px 10px rgba(0,0,0,.2)}.card:active{cursor:grabbing}.card.dragging{opacity:.45;transform:rotate(1deg)}.card-row{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.35}.card-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}.status-select{font-weight:700;color:white;min-width:118px}.pill{display:inline-block;font-size:11px;border:1px solid var(--border);padding:3px 6px;border-radius:20px;cursor:pointer;color:var(--muted)}
table{width:100%;border-collapse:collapse;background:var(--card)}th,td{border:1px solid var(--border);padding:8px;font-size:13px;text-align:left;vertical-align:top}th{background:#252944}.hidden{display:none}
dialog{background:#171a32;color:var(--text);border:1px solid var(--border);border-radius:10px;width:min(460px,92vw)}dialog form{display:grid;gap:8px}.test-pass{color:var(--green);font-size:12px;margin-left:auto}.test-fail{color:var(--red);font-size:12px;margin-left:auto}
</style>
</head>
<body>
<div class="app">
<header class="header"><div><h1>T$O</h1><div class="sub">Shared Kanban powered by Supabase</div><div class="tabs"><button class="tab active" onclick="switchView('kanban')">Kanban</button><button class="tab" onclick="switchView('table')">Main Table</button></div></div></header>
<div class="toolbar"><button class="new-btn" onclick="openModal()">New</button><input id="search" placeholder="Search" oninput="render()" /><button onclick="resetDemo()">Reset Demo</button><button onclick="loadItems()">Refresh</button><span id="syncStatus"></span><span id="testResult"></span></div>
<div id="kanbanView"><div id="board" class="board"></div></div>
<div id="tableView" class="hidden"><table><thead><tr><th>Title</th><th>Status</th><th>Person</th><th>Goal</th><th>Next</th><th>Blocker</th></tr></thead><tbody id="tableBody"></tbody></table></div>
</div>
<dialog id="modal"><form onsubmit="saveItem(event)"><h3>New Card</h3><input id="title" placeholder="Title" required /><select id="status"></select><input id="person" placeholder="Person" /><textarea id="goal" placeholder="Goal"></textarea><textarea id="nextAction" placeholder="Next"></textarea><textarea id="blocker" placeholder="Blocker"></textarea><button type="submit">Save</button><button type="button" onclick="closeModal()">Cancel</button></form></dialog>
<script>
/*
Supabase setup SQL:

create table public.kanban_items (
  id text primary key,
  title text not null,
  status text not null,
  person text,
  goal text,
  next_action text,
  blocker text,
  sort_order bigint,
  updated_at timestamptz default now()
);

alter table public.kanban_items enable row level security;

create policy "Allow public read" on public.kanban_items for select using (true);
create policy "Allow public insert" on public.kanban_items for insert with check (true);
create policy "Allow public update" on public.kanban_items for update using (true);
create policy "Allow public delete" on public.kanban_items for delete using (true);
*/

const SUPABASE_URL='https://yavxkarxbdkdqmnqqmrg.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdnhrYXJ4YmRrZHFtbnFxbXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDUxMTksImV4cCI6MjA5MjM4MTExOX0.nMSVm5ddGaMIGQ8OfOeE-oy1RBaFO0FGxhNssgCaiVk';
const hasBackend=!SUPABASE_URL.includes('PASTE_')&&!SUPABASE_ANON_KEY.includes('PASTE_');
const db=hasBackend?supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY):null;
let items=[];

const lanes=[{name:'Planned',color:'var(--cyan)'},{name:'In Progress',color:'var(--purple)'},{name:'Working on it',color:'var(--orange)'},{name:'Stuck',color:'var(--red)'},{name:'Done',color:'var(--green)'},{name:'Backlog',color:'#000000'}];
const demoItems=[{id:'1',title:'Build onboarding workflow',status:'Backlog',person:'Sam',goal:'Standardize onboarding',nextAction:'Outline steps',blocker:''},{id:'2',title:'Define reporting dashboard',status:'Planned',person:'Team',goal:'Exec visibility',nextAction:'List KPIs',blocker:''},{id:'3',title:'Set up integrations',status:'Working on it',person:'Sam',goal:'Automate data flow',nextAction:'Connect APIs',blocker:''},{id:'4',title:'Fix data sync issue',status:'Stuck',person:'Client',goal:'Data accuracy',nextAction:'Review logs',blocker:'Missing credentials'},{id:'5',title:'Launch campaign',status:'In Progress',person:'Team',goal:'Generate leads',nextAction:'Finalize assets',blocker:''},{id:'6',title:'Close project',status:'Done',person:'Sam',goal:'Project completion',nextAction:'Send recap',blocker:''}];

const statusSelect=document.getElementById('status');
lanes.forEach(l=>{const option=document.createElement('option');option.value=l.name;option.textContent=l.name;option.style.background=l.color;option.style.color='white';statusSelect.appendChild(option)});
function setSync(message,ok=true){const el=document.getElementById('syncStatus');el.className=ok?'sync-ok':'sync-bad';el.textContent=message}
function toDbItem(i){return{id:i.id,title:i.title,status:i.status,person:i.person||'',goal:i.goal||'',next_action:i.nextAction||'',blocker:i.blocker||'',sort_order:Number(i.id)||Date.now(),updated_at:new Date().toISOString()}}
function fromDbItem(i){return{id:i.id,title:i.title,status:i.status,person:i.person||'',goal:i.goal||'',nextAction:i.next_action||'',blocker:i.blocker||''}}
function getLane(status){return lanes.find(l=>l.name===status)||lanes[0]}
function escapeHtml(value){return String(value||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

async function loadItems(){
  if(!hasBackend){items=JSON.parse(localStorage.getItem('items')||'null')||demoItems;localStorage.setItem('items',JSON.stringify(items));setSync('Local mode: add Supabase keys to sync',false);render();return}
  const {data,error}=await db.from('kanban_items').select('*').order('sort_order',{ascending:true});
  if(error){setSync('Sync error: '+error.message,false);return}
  if(!data.length){await db.from('kanban_items').insert(demoItems.map(toDbItem));return loadItems()}
  items=data.map(fromDbItem);setSync('Synced');render();
}
async function saveItems(){
  if(!hasBackend){localStorage.setItem('items',JSON.stringify(items));setSync('Saved locally',false);render();return}
  const {error}=await db.from('kanban_items').upsert(items.map(toDbItem));
  if(error){setSync('Save error: '+error.message,false);return}
  setSync('Saved + synced');render();
}

function switchView(view){document.getElementById('kanbanView').classList.toggle('hidden',view!=='kanban');document.getElementById('tableView').classList.toggle('hidden',view!=='table');document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(view==='kanban'&&i===0)||(view==='table'&&i===1)));render()}
function render(){const search=document.getElementById('search').value.toLowerCase();const filtered=items.filter(i=>JSON.stringify(i).toLowerCase().includes(search));const board=document.getElementById('board');board.innerHTML='';lanes.forEach(l=>{const laneName=l.name;const laneColor=l.color;const col=document.createElement('div');col.className='lane';col.dataset.status=laneName;col.innerHTML=`<div class="lane-header" style="background:${laneColor}">${escapeHtml(laneName)}</div><div class="lane-body"></div>`;col.addEventListener('dragover',handleDragOver);col.addEventListener('dragleave',handleDragLeave);col.addEventListener('drop',handleDrop);const body=col.querySelector('.lane-body');filtered.filter(i=>i.status===laneName).forEach(item=>{const card=document.createElement('div');card.className='card';card.draggable=true;card.dataset.id=item.id;card.addEventListener('dragstart',handleDragStart);card.addEventListener('dragend',handleDragEnd);card.innerHTML=`<div><b>${escapeHtml(item.title)}</b></div><div class="card-row">${escapeHtml(item.person)}</div><div class="card-row">${escapeHtml(item.goal)}</div><div class="card-row">${escapeHtml(item.nextAction)}</div>${item.blocker?`<div class="card-row">⚠ ${escapeHtml(item.blocker)}</div>`:''}<div class="card-actions"><span class="pill" onclick="move('${item.id}',-1)">←</span><span class="pill" onclick="move('${item.id}',1)">→</span><select class="status-select" style="background:${getLane(item.status).color};color:white" onchange="changeStatus('${item.id}',this.value)">${lanes.map(s=>`<option value="${escapeHtml(s.name)}" style="background:${s.color};color:white" ${s.name===item.status?'selected':''}>${escapeHtml(s.name)}</option>`).join('')}</select><span class="pill" onclick="remove('${item.id}')">Delete</span></div>`;body.appendChild(card)});board.appendChild(col)});const tbody=document.getElementById('tableBody');tbody.innerHTML='';filtered.forEach(i=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${escapeHtml(i.title)}</td><td>${escapeHtml(i.status)}</td><td>${escapeHtml(i.person)}</td><td>${escapeHtml(i.goal)}</td><td>${escapeHtml(i.nextAction)}</td><td>${escapeHtml(i.blocker)}</td>`;tbody.appendChild(tr)})}

let draggedCardId=null;function handleDragStart(e){draggedCardId=e.currentTarget.dataset.id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',draggedCardId)}function handleDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.lane').forEach(lane=>lane.classList.remove('drag-over'))}function handleDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}function handleDragLeave(e){e.currentTarget.classList.remove('drag-over')}function handleDrop(e){e.preventDefault();const lane=e.currentTarget;lane.classList.remove('drag-over');const id=e.dataTransfer.getData('text/plain')||draggedCardId;if(!id)return;changeStatus(id,lane.dataset.status);draggedCardId=null}
function move(id,dir){const item=items.find(i=>i.id===id);if(!item)return;const idx=lanes.findIndex(l=>l.name===item.status);const safeIdx=idx>=0?idx:0;item.status=lanes[Math.max(0,Math.min(lanes.length-1,safeIdx+dir))].name;saveItems()}
function changeStatus(id,status){const item=items.find(i=>i.id===id);if(!item)return;item.status=status;saveItems()}
async function remove(id){items=items.filter(i=>i.id!==id);if(hasBackend){const {error}=await db.from('kanban_items').delete().eq('id',id);if(error){setSync('Delete error: '+error.message,false);return}}saveItems()}
function openModal(){document.getElementById('modal').showModal()}function closeModal(){document.getElementById('modal').close()}
async function resetDemo(){items=[...demoItems];if(hasBackend){await db.from('kanban_items').delete().neq('id','');await db.from('kanban_items').insert(items.map(toDbItem))}saveItems()}
function saveItem(e){e.preventDefault();items.push({id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(),title:document.getElementById('title').value,status:document.getElementById('status').value,person:document.getElementById('person').value,goal:document.getElementById('goal').value,nextAction:document.getElementById('nextAction').value,blocker:document.getElementById('blocker').value});document.getElementById('modal').close();e.target.reset();saveItems()}
function runTests(){const result=document.getElementById('testResult');try{console.assert(Array.isArray(lanes)&&lanes.every(l=>l.name&&l.color),'lanes need name/color');console.assert(getLane('Done').name==='Done','getLane should find Done');console.assert(typeof render==='function','render exists');console.assert(statusSelect.options.length===lanes.length,'status dropdown should include all lanes');result.className='test-pass';result.textContent='Tests passed'}catch(e){result.className='test-fail';result.textContent='Tests failed';console.error(e)}}

loadItems();runTests();
</script>
</body>
</html>
