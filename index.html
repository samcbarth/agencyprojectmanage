<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agency Project Manager</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#11142a;--lane:#30334f;--card:#171a32;--text:#f7f7fb;--muted:#aab0c6;--border:#3d415f;--blue:#0f6fc2;--orange:#d98a1f;--red:#c13f5c;--green:#1fa86e;--cyan:#1f7fa3;--purple:#7e4db3;--black:#000000}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;overflow-x:hidden}.app{padding:14px}.header{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:10px}h1{margin:0 0 6px;font-size:22px}.sub{font-size:12px;color:var(--muted)}.tabs{display:flex;gap:20px;margin-top:8px}.tab{background:none;border:0;color:var(--text);padding:8px 0;cursor:pointer}.tab.active{border-bottom:3px solid var(--blue)}.toolbar{display:flex;gap:10px;padding:15px 0;flex-wrap:wrap;align-items:center;position:sticky;top:0;background:var(--bg);z-index:8}button,input,select,textarea{background:#252944;color:white;border:1px solid var(--border);border-radius:6px;padding:7px;font-size:12px;font-family:inherit}textarea{min-height:72px;resize:vertical}.new-btn{background:var(--blue)!important}.sync-ok{color:var(--green);font-size:12px}.sync-bad{color:var(--red);font-size:12px}.mobile-hint{display:none;color:var(--muted);font-size:12px}.board{display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;padding-bottom:18px;scroll-snap-type:x proximity;scroll-padding:12px;-webkit-overflow-scrolling:touch}.lane{flex:0 0 245px;max-width:245px;background:var(--lane);border-radius:8px;overflow:hidden;scroll-snap-align:start;scroll-snap-stop:always}.lane.drag-over{outline:2px dashed var(--blue);outline-offset:-6px;background:#3a3e5f}.lane-header{padding:10px;font-weight:bold;color:white;position:relative;top:auto;z-index:1;display:flex;justify-content:space-between;align-items:center}.lane-body{padding:10px;min-height:520px}.card{background:var(--card);padding:10px;border-radius:7px;margin-bottom:10px;cursor:grab;box-shadow:0 4px 10px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04)}.card:active{cursor:grabbing}.card.dragging{opacity:.45;transform:rotate(1deg)}.card-title{font-weight:800;margin-bottom:8px;font-size:13px;line-height:1.25;color:white}.card-row{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.35}.card-row b{display:block;color:#d9ddef;font-size:10px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}.card-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}.status-select{font-weight:700;color:white;min-width:118px}.pill{display:inline-block;font-size:11px;border:1px solid var(--border);padding:4px 7px;border-radius:20px;cursor:pointer;color:var(--muted)}.priority-high{color:#ff8a9d}.priority-medium{color:#ffcd7a}.priority-low{color:#8edeb8}.chips{display:flex;gap:5px;flex-wrap:wrap;margin:7px 0 9px}.chip{border:1px solid var(--border);border-radius:999px;padding:3px 6px;font-size:10px;color:#d9ddef;background:#252944}.avatar{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#4250d8;color:white;font-size:11px;margin-right:5px}table{width:100%;border-collapse:collapse;background:var(--card)}th,td{border:1px solid var(--border);padding:8px;font-size:13px;text-align:left;vertical-align:top}th{background:#252944}.hidden{display:none}dialog{background:#171a32;color:var(--text);border:1px solid var(--border);border-radius:10px;width:min(720px,94vw)}dialog form,.drawer-grid{display:grid;gap:8px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.drawer{position:fixed;right:0;top:0;height:100vh;width:min(520px,96vw);background:#171a32;border-left:1px solid var(--border);padding:16px;z-index:20;overflow:auto;box-shadow:-8px 0 28px rgba(0,0,0,.35)}.drawer h2{margin-top:0}.history{font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:12px;padding-top:8px}.focus-on .lane[data-status='Planned'],.focus-on .lane[data-status='Backlog'],.focus-on .lane[data-status='Done']{display:none}.test-pass{color:var(--green);font-size:12px}.test-fail{color:var(--red);font-size:12px}
@media(max-width:760px){body{overflow:hidden}.app{padding:10px;height:100dvh;overflow:hidden}.header{display:block}.toolbar{gap:7px;padding:10px 0;position:relative}.toolbar input{width:130px}.mobile-hint{display:inline}.board{height:calc(100dvh - 160px);gap:10px;scroll-snap-type:x mandatory;overflow-x:auto;overflow-y:hidden}.lane{flex:0 0 calc(100vw - 20px);max-width:calc(100vw - 20px);height:100%;display:flex;flex-direction:column}.lane-header{position:relative;top:0}.lane-body{overflow-y:auto;min-height:0;flex:1}.card{padding:11px}.form-grid{grid-template-columns:1fr}dialog{width:96vw}.drawer{width:100vw}.tabs{gap:14px}}
</style>
</head>
<body>
<div class="app" id="app">
<header class="header"><div><h1>Agency Project Manager</h1><div class="sub">Project shepherding, Claude skill execution, learning loops, and resource-aware delivery.</div><div class="tabs"><button class="tab active" onclick="switchView('kanban')">Kanban</button><button class="tab" onclick="switchView('table')">Main Table</button></div></div></header>
<div class="toolbar"><button class="new-btn" onclick="openModal()">New</button><input id="search" placeholder="Search" oninput="render()" /><select id="ownerFilter" onchange="render()"><option value="">All owners</option></select><button onclick="toggleFocus()">Focus Mode</button><button onclick="loadItems()">Refresh</button><span class="mobile-hint">Swipe lanes →</span><span id="syncStatus"></span><span id="testResult"></span></div>
<div id="kanbanView"><div id="board" class="board"></div></div>
<div id="tableView" class="hidden"><table><thead><tr><th>Title</th><th>Status</th><th>Owner</th><th>Priority</th><th>Claude Skill</th><th>Goal</th><th>Next</th><th>Blocker</th></tr></thead><tbody id="tableBody"></tbody></table></div>
</div>

<dialog id="modal"><form onsubmit="saveItem(event)"><h3>New Project Card</h3><input id="title" placeholder="Title" required /><div class="form-grid"><select id="status"></select><select id="person"></select><select id="priority"><option>High</option><option selected>Medium</option><option>Low</option></select><select id="claudeSkill"></select><input id="projectType" placeholder="Project type" /><input id="dueDate" type="date" /></div><textarea id="goal" placeholder="Goal alignment"></textarea><textarea id="successCriteria" placeholder="Success criteria"></textarea><textarea id="nextAction" placeholder="Next action"></textarea><textarea id="blocker" placeholder="Blocker / dependency"></textarea><textarea id="nextPrompt" placeholder="Next Claude prompt or command"></textarea><button type="submit">Save</button><button type="button" onclick="closeModal()">Cancel</button></form></dialog>
<div id="drawerHost"></div>

<script>
/*
Optional Supabase upgrade SQL for the added properties:

alter table public.kanban_items add column if not exists notes text;
alter table public.kanban_items add column if not exists links text;
alter table public.kanban_items add column if not exists subtasks jsonb default '[]'::jsonb;
alter table public.kanban_items add column if not exists history jsonb default '[]'::jsonb;
alter table public.kanban_items add column if not exists project_type text;
alter table public.kanban_items add column if not exists success_criteria text;
alter table public.kanban_items add column if not exists priority text;
alter table public.kanban_items add column if not exists claude_skill text;
alter table public.kanban_items add column if not exists project_shepherd text;
alter table public.kanban_items add column if not exists next_prompt text;
alter table public.kanban_items add column if not exists learning_loop text;
alter table public.kanban_items add column if not exists tool_stack text;
alter table public.kanban_items add column if not exists resource_need text;
alter table public.kanban_items add column if not exists decision_needed text;
alter table public.kanban_items add column if not exists due_date date;
alter table public.kanban_items add column if not exists sort_order numeric;
*/

const SUPABASE_URL='https://yavxkarxbdkdqmnqqmrg.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdnhrYXJ4YmRrZHFtbnFxbXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDUxMTksImV4cCI6MjA5MjM4MTExOX0.nMSVm5ddGaMIGQ8OfOeE-oy1RBaFO0FGxhNssgCaiVk';
const hasBackend=!SUPABASE_URL.includes('PASTE_')&&!SUPABASE_ANON_KEY.includes('PASTE_');
const db=hasBackend?supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY):null;
let items=[];let focus=false;let draggedCardId=null;
const people=['Sam','Team','Client','Vendor','Layer'];
const skills=['/align-goals','/define-project','/prioritize-projects','/build-roadmap','/plan-week','/review-progress','/capture-lessons','/evaluate-tool','/shepherd-team','/decision-log'];
const lanes=[{name:'Planned',color:'var(--cyan)'},{name:'In Progress',color:'var(--purple)'},{name:'Working on it',color:'var(--orange)'},{name:'Stuck',color:'var(--red)'},{name:'Done',color:'var(--green)'},{name:'Backlog',color:'#000000'}];
const demoItems=[{id:'1',title:'Build onboarding workflow',status:'Backlog',person:'Sam',priority:'High',claudeSkill:'/define-project',projectType:'System build',goal:'Standardize onboarding',successCriteria:'Reusable flow documented and tested',nextAction:'Outline steps',blocker:'',nextPrompt:'Turn this into a project brief',learningLoop:'Capture lessons after first use',toolStack:'Claude, GitHub, Supabase',resourceNeed:'2 focused build blocks',decisionNeeded:'Which fields are required?',dueDate:'',notes:'',links:'',subtasks:[],history:[],sortOrder:1},{id:'2',title:'Review active priorities',status:'Planned',person:'Sam',priority:'Medium',claudeSkill:'/prioritize-projects',projectType:'Planning',goal:'Use resources effectively',successCriteria:'Top 3 priorities selected',nextAction:'Compare impact vs effort',blocker:'',nextPrompt:'Rank these projects by impact, urgency, and effort',learningLoop:'Review weekly',toolStack:'Claude skills',resourceNeed:'30 minutes',decisionNeeded:'What gets delayed?',dueDate:'',notes:'',links:'',subtasks:[],history:[],sortOrder:2}];

function initSelects(){fillSelect('status',lanes.map(l=>l.name));fillSelect('person',people);fillSelect('ownerFilter',people,true);fillSelect('claudeSkill',skills)}
function fillSelect(id,arr,keepFirst=false){const el=document.getElementById(id);if(!keepFirst)el.innerHTML='';arr.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o)})}
function setSync(m,ok=true){const el=document.getElementById('syncStatus');el.className=ok?'sync-ok':'sync-bad';el.textContent=m}function getLane(s){return lanes.find(l=>l.name===s)||lanes[0]}function esc(v){return String(v||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function stamp(t){return{time:new Date().toLocaleString(),text:t}}
function toDbItem(i){return{id:i.id,title:i.title,status:i.status,person:i.person||'',goal:i.goal||'',next_action:i.nextAction||'',blocker:i.blocker||'',sort_order:i.sortOrder||Date.now(),updated_at:new Date().toISOString(),notes:i.notes||'',links:i.links||'',subtasks:i.subtasks||[],history:i.history||[],project_type:i.projectType||'',success_criteria:i.successCriteria||'',priority:i.priority||'',claude_skill:i.claudeSkill||'',project_shepherd:i.projectShepherd||'',next_prompt:i.nextPrompt||'',learning_loop:i.learningLoop||'',tool_stack:i.toolStack||'',resource_need:i.resourceNeed||'',decision_needed:i.decisionNeeded||'',due_date:i.dueDate||null}}
function fromDbItem(i){return{id:i.id,title:i.title,status:i.status,person:i.person||'',goal:i.goal||'',nextAction:i.next_action||'',blocker:i.blocker||'',sortOrder:i.sort_order||Date.now(),notes:i.notes||'',links:i.links||'',subtasks:i.subtasks||[],history:i.history||[],projectType:i.project_type||'',successCriteria:i.success_criteria||'',priority:i.priority||'Medium',claudeSkill:i.claude_skill||'',projectShepherd:i.project_shepherd||'',nextPrompt:i.next_prompt||'',learningLoop:i.learning_loop||'',toolStack:i.tool_stack||'',resourceNeed:i.resource_need||'',decisionNeeded:i.decision_needed||'',dueDate:i.due_date||''}}
async function loadItems(){if(!hasBackend){items=JSON.parse(localStorage.getItem('items')||'null')||demoItems;localStorage.setItem('items',JSON.stringify(items));setSync('Local mode: add Supabase key',false);render();return}const{data,error}=await db.from('kanban_items').select('*').order('sort_order',{ascending:true});if(error){setSync('Sync error: '+error.message,false);return}if(!data.length){await db.from('kanban_items').insert(demoItems.map(toDbItem));return loadItems()}items=data.map(fromDbItem);setSync('Live synced');render()}
async function saveOne(item){if(!hasBackend){localStorage.setItem('items',JSON.stringify(items));render();return}const{error}=await db.from('kanban_items').upsert(toDbItem(item));if(error)setSync('Save error: '+error.message,false);else setSync('Saved')}
function subscribeRealtime(){if(!hasBackend)return;db.channel('kanban-live').on('postgres_changes',{event:'*',schema:'public',table:'kanban_items'},()=>loadItems()).subscribe()}
function switchView(view){document.getElementById('kanbanView').classList.toggle('hidden',view!=='kanban');document.getElementById('tableView').classList.toggle('hidden',view!=='table');document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(view==='kanban'&&i===0)||(view==='table'&&i===1)));render()}function toggleFocus(){focus=!focus;document.getElementById('app').classList.toggle('focus-on',focus)}
function filteredItems(){const s=document.getElementById('search').value.toLowerCase();const o=document.getElementById('ownerFilter').value;return items.filter(i=>JSON.stringify(i).toLowerCase().includes(s)&&(!o||i.person===o)).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0))}
function field(label,value,cls=''){return value?`<div class="card-row ${cls}"><b>${label}</b>${esc(value)}</div>`:''}
function render(){const filtered=filteredItems();const board=document.getElementById('board');board.innerHTML='';lanes.forEach(l=>{const col=document.createElement('div');col.className='lane';col.dataset.status=l.name;const count=filtered.filter(i=>i.status===l.name).length;col.innerHTML=`<div class="lane-header" style="background:${l.color}"><span>${esc(l.name)}</span><span>${count}</span></div><div class="lane-body"></div>`;col.addEventListener('dragover',handleDragOver);col.addEventListener('dragleave',handleDragLeave);col.addEventListener('drop',handleDrop);const body=col.querySelector('.lane-body');filtered.filter(i=>i.status===l.name).forEach(item=>{const card=document.createElement('div');card.className='card';card.draggable=true;card.dataset.id=item.id;card.addEventListener('dragstart',handleDragStart);card.addEventListener('dragend',handleDragEnd);card.innerHTML=`<div class="card-title">${esc(item.title)}</div><div class="chips"><span class="chip">${esc(item.priority||'Medium')}</span><span class="chip">${esc(item.claudeSkill||'No skill')}</span></div>${field('Owner',item.person)}${field('Goal Alignment',item.goal)}${field('Next Action',item.nextAction)}${field('Blocker / Dependency',item.blocker)}${field('Next Claude Prompt',item.nextPrompt)}<div class="card-actions"><span class="pill" onclick="move('${item.id}',-1)">←</span><span class="pill" onclick="move('${item.id}',1)">→</span><select class="status-select" style="background:${getLane(item.status).color};color:white" onchange="changeStatus('${item.id}',this.value)">${lanes.map(s=>`<option value="${esc(s.name)}" ${s.name===item.status?'selected':''}>${esc(s.name)}</option>`).join('')}</select><span class="pill" onclick="openDetails('${item.id}')">Open</span><span class="pill" onclick="removeItem('${item.id}')">Delete</span></div>`;body.appendChild(card)});board.appendChild(col)});const tbody=document.getElementById('tableBody');tbody.innerHTML='';filtered.forEach(i=>{const tr=document.createElement('tr');tr.innerHTML=`<td><button onclick="openDetails('${i.id}')">Open</button> ${esc(i.title)}</td><td>${esc(i.status)}</td><td>${esc(i.person)}</td><td>${esc(i.priority)}</td><td>${esc(i.claudeSkill)}</td><td>${esc(i.goal)}</td><td>${esc(i.nextAction)}</td><td>${esc(i.blocker)}</td>`;tbody.appendChild(tr)})}
function handleDragStart(e){draggedCardId=e.currentTarget.dataset.id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',draggedCardId)}function handleDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.lane').forEach(l=>l.classList.remove('drag-over'))}function handleDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}function handleDragLeave(e){e.currentTarget.classList.remove('drag-over')}async function handleDrop(e){e.preventDefault();const lane=e.currentTarget;lane.classList.remove('drag-over');const id=e.dataTransfer.getData('text/plain')||draggedCardId;const item=items.find(i=>i.id===id);if(!item)return;item.status=lane.dataset.status;item.sortOrder=Date.now();item.history=[stamp('Moved to '+item.status),...(item.history||[])];await saveOne(item);draggedCardId=null;render()}
async function move(id,dir){const item=items.find(i=>i.id===id);if(!item)return;const idx=lanes.findIndex(l=>l.name===item.status);item.status=lanes[Math.max(0,Math.min(lanes.length-1,idx+dir))].name;item.sortOrder=Date.now();item.history=[stamp('Moved to '+item.status),...(item.history||[])];await saveOne(item);render()}async function changeStatus(id,status){const item=items.find(i=>i.id===id);if(!item)return;item.status=status;item.history=[stamp('Status changed to '+status),...(item.history||[])];await saveOne(item);render()}async function removeItem(id){items=items.filter(i=>i.id!==id);if(hasBackend)await db.from('kanban_items').delete().eq('id',id);else localStorage.setItem('items',JSON.stringify(items));render()}
function openModal(){document.getElementById('modal').showModal()}function closeModal(){document.getElementById('modal').close()}async function saveItem(e){e.preventDefault();const item={id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(),title:title.value,status:status.value,person:person.value,priority:priority.value,claudeSkill:claudeSkill.value,projectType:projectType.value,dueDate:dueDate.value,goal:goal.value,successCriteria:successCriteria.value,nextAction:nextAction.value,blocker:blocker.value,nextPrompt:nextPrompt.value,notes:'',links:'',subtasks:[],history:[stamp('Card created')],sortOrder:Date.now()};items.push(item);document.getElementById('modal').close();e.target.reset();await saveOne(item);render()}
function openDetails(id){const i=items.find(x=>x.id===id);if(!i)return;document.getElementById('drawerHost').innerHTML=`<aside class="drawer"><button onclick="closeDetails()">Close</button><h2>${esc(i.title)}</h2><div class="drawer-grid"><input id="dTitle" value="${esc(i.title)}"><select id="dStatus">${lanes.map(l=>`<option ${l.name===i.status?'selected':''}>${esc(l.name)}</option>`).join('')}</select><select id="dPerson">${people.map(p=>`<option ${p===i.person?'selected':''}>${esc(p)}</option>`).join('')}</select><select id="dPriority"><option ${i.priority==='High'?'selected':''}>High</option><option ${i.priority==='Medium'?'selected':''}>Medium</option><option ${i.priority==='Low'?'selected':''}>Low</option></select><select id="dClaudeSkill">${skills.map(s=>`<option ${s===i.claudeSkill?'selected':''}>${esc(s)}</option>`).join('')}</select><input id="dProjectType" value="${esc(i.projectType)}" placeholder="Project type"><input id="dDueDate" type="date" value="${esc(i.dueDate)}"><textarea id="dGoal" placeholder="Goal alignment">${esc(i.goal)}</textarea><textarea id="dSuccess" placeholder="Success criteria">${esc(i.successCriteria)}</textarea><textarea id="dNext" placeholder="Next action">${esc(i.nextAction)}</textarea><textarea id="dBlocker" placeholder="Blocker / dependency">${esc(i.blocker)}</textarea><textarea id="dPrompt" placeholder="Next Claude prompt">${esc(i.nextPrompt)}</textarea><textarea id="dLearning" placeholder="Learning loop">${esc(i.learningLoop)}</textarea><textarea id="dTools" placeholder="Tool stack">${esc(i.toolStack)}</textarea><textarea id="dResources" placeholder="Resource need">${esc(i.resourceNeed)}</textarea><textarea id="dDecision" placeholder="Decision needed">${esc(i.decisionNeeded)}</textarea><textarea id="dNotes" placeholder="Notes">${esc(i.notes)}</textarea><textarea id="dLinks" placeholder="Links">${esc(i.links)}</textarea><button onclick="saveDetails('${i.id}')">Save Details</button><div class="history"><b>History</b>${(i.history||[]).slice(0,8).map(h=>`<div>${esc(h.time)} — ${esc(h.text)}</div>`).join('')}</div></div></aside>`}
function closeDetails(){document.getElementById('drawerHost').innerHTML=''}async function saveDetails(id){const i=items.find(x=>x.id===id);if(!i)return;i.title=dTitle.value;i.status=dStatus.value;i.person=dPerson.value;i.priority=dPriority.value;i.claudeSkill=dClaudeSkill.value;i.projectType=dProjectType.value;i.dueDate=dDueDate.value;i.goal=dGoal.value;i.successCriteria=dSuccess.value;i.nextAction=dNext.value;i.blocker=dBlocker.value;i.nextPrompt=dPrompt.value;i.learningLoop=dLearning.value;i.toolStack=dTools.value;i.resourceNeed=dResources.value;i.decisionNeeded=dDecision.value;i.notes=dNotes.value;i.links=dLinks.value;i.history=[stamp('Details updated'),...(i.history||[])];await saveOne(i);closeDetails();render()}
async function resetDemo(){items=demoItems.map(i=>({...i,history:[stamp('Demo reset')]}));if(hasBackend){await db.from('kanban_items').delete().neq('id','');await db.from('kanban_items').insert(items.map(toDbItem))}else localStorage.setItem('items',JSON.stringify(items));render()}
function runTests(){const r=document.getElementById('testResult');try{console.assert(lanes.length===6,'six lanes');console.assert(!lanes.some(l=>l.name==='Blank'),'blank removed');console.assert(typeof openDetails==='function','drawer exists');console.assert(skills.includes('/shepherd-team'),'claude skills loaded');r.className='test-pass';r.textContent='Tests passed'}catch(e){r.className='test-fail';r.textContent='Tests failed';console.error(e)}}
initSelects();loadItems();subscribeRealtime();runTests();
</script>
</body>
</html>
