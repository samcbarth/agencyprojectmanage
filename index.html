<body>
<div class="app" id="app">
<header class="header"><div><h1>Agency Project Manager <span id="version" style="font-size:12px;color:var(--muted);"></span></h1><div class="sub">Structured agent work packets for Claude skills, project shepherding, learning loops, and delivery.</div><div id="versionHistory" class="sub"></div><div class="checkpoint"><span class="checkpoint-label">Checkpoint</span><strong id="checkpointCountdown" class="checkpoint-time">Set a date</strong><input id="checkpointDate" type="datetime-local" onchange="saveCheckpointDate()" /></div><div class="agent-bar" id="agentBar"></div><div class="tabs"><button class="tab active" data-view="kanban" onclick="switchView('kanban')">Kanban</button><button class="tab" data-view="table" onclick="switchView('table')">Main Table</button><button class="tab" data-view="activity" onclick="switchView('activity')">Activity</button><button class="tab" data-view="queue" onclick="switchView('queue')">Action Queue</button><button class="tab" data-view="stats" onclick="switchView('stats')">Stats</button><button class="tab" data-view="scripts" onclick="switchView('scripts')">Scripts</button></div></div></header>
<div class="toolbar"><button class="new-btn" onclick="openModal()">New</button><input id="search" placeholder="Search" oninput="render()" /><select id="ownerFilter" onchange="render()"><option value="">All owners</option></select><button onclick="toggleFocus()">Focus Mode</button><button onclick="loadItems()">Refresh</button><span class="mobile-hint">Swipe lanes →</span><span id="syncStatus"></span><span id="testResult"></span></div>
<div id="kanbanView"><div id="homePreviews" class="panel"></div><div id="board" class="board"></div></div>
<div id="tableView" class="hidden"><table><thead><tr><th>Title</th><th>Status</th><th>Agent</th><th>Owner</th><th>Priority</th><th>Claude Skill</th><th>Goal</th><th>Next</th><th>Action</th><th>Progress</th><th>Blocker</th></tr></thead><tbody id="tableBody"></tbody></table></div>
<div id="activityView" class="hidden panel"><div id="activityFeed"></div></div>
<div id="queueView" class="hidden panel"><div id="actionQueue"></div></div>
<div id="statsView" class="hidden panel"><div id="statsPanel"></div></div>
<div id="scriptsView" class="hidden panel"><div id="scriptConsole"></div></div>
</div>

<dialog id="modal"><form onsubmit="saveItem(event)"><h3>New Project Card</h3><input id="title" placeholder="Title" required /><div class="form-grid"><select id="status"></select><select id="assignedAgent"></select><select id="person"></select><select id="priority"><option>High</option><option selected>Medium</option><option>Low</option></select><select id="claudeSkill"></select><input id="projectType" placeholder="Project type" /><input id="dueDate" type="date" /></div><textarea id="goal" placeholder="Goal alignment"></textarea><textarea id="successCriteria" placeholder="Success criteria"></textarea><textarea id="inputContext" placeholder="Input context / source notes"></textarea><textarea id="desiredOutput" placeholder="Desired output format"></textarea><textarea id="nextAction" placeholder="Next action"></textarea><textarea id="blocker" placeholder="Blocker / dependency"></textarea><textarea id="nextPrompt" placeholder="Next Claude prompt"></textarea><div class="form-grid"><select id="actionType"></select><select id="actionOwner"></select><select id="actionStatus"></select><input id="actionTarget" placeholder="Action target / repo / endpoint" /></div><textarea id="actionNeeded" placeholder="Action needed"></textarea><textarea id="actionInput" placeholder="Action input"></textarea><textarea id="actionOutputExpected" placeholder="Action output expected"></textarea><button type="submit">Save</button><button type="button" onclick="closeModal()">Cancel</button></form></dialog>
<div id="drawerHost"></div>

<script>

const BUILD_VERSION='0.00012';
const VERSION_HISTORY=['0.00012 - Added agent status and progress bars','0.00011 - Added home previews for stats and scripts','0.00010 - Added agent leaderboard, rewards, and KPI stats','0.00009 - Added script console and on-demand runner controls','0.00008 - Added branded typography system','0.00007 - Added checkpoint countdown motivator','0.00006 - Added activity feed, action queue, and runner scaffold','0.00005 - Added action request and agent progress fields','0.00004 - Forced full-screen lane layout for mobile and touch devices','0.00003 - Made mobile lanes full-screen swipe panels','0.00002 - Added dynamic agent boxes, structured prompts, and visible version history','0.00001 - Added timestamp version display'];
const SUPABASE_URL='https://yavxkarxbdkdqmnqqmrg.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdnhrYXJ4YmRrZHFtbnFxbXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDUxMTksImV4cCI6MjA5MjM4MTExOX0.nMSVm5ddGaMIGQ8OfOeE-oy1RBaFO0FGxhNssgCaiVk';

let items=[];let focus=false;let draggedCardId=null;let activeAgent='';
let checkpointTimer=null;
const scripts=[{id:'senior-pm',name:'Senior PM Runner',path:'/run/senior-pm',schedule:'Manual or Task Scheduler',description:'Reviews active cards, updates priority, decision fields, action requests, AI summaries, and stuck status.'}];
const people=['Sam','Team','Client','Vendor','Layer'];
const skills=['/align-goals','/define-project','/prioritize-projects','/build-roadmap','/plan-week','/review-progress','/capture-lessons','/evaluate-tool','/shepherd-team','/decision-log'];
const actionTypes=['Planning','Code Build','API Expansion','Research','Testing','Documentation','Automation','Decision'];
const actionStatuses=['Requested','Assigned','In Progress','Waiting','Blocked','Done'];
const executionAgents=['Project Manager','Project Shepherd','Tool Evaluator','Senior Project Manager','HubSpot API Agent','Code Builder Agent','Testing Agent','Documentation Agent'];
const agentDefaults={
  'Project Manager':{skill:'/plan-week',desc:'Execution + next actions',output:'1. Recommended next action\n2. Task breakdown\n3. Timeline\n4. Owner/resources needed\n5. Updated card fields'},
  'Project Shepherd':{skill:'/shepherd-team',desc:'Alignment + team flow',output:'1. Alignment check\n2. Stakeholder message\n3. Blockers/risks\n4. Suggested next move\n5. Updated card fields'},
  'Tool Evaluator':{skill:'/evaluate-tool',desc:'Tools + systems fit',output:'1. Tool fit\n2. Cost/friction\n3. Integration value\n4. Keep/change/remove recommendation\n5. Next test'},
  'Senior Project Manager':{skill:'/prioritize-projects',desc:'Priority + risk oversight',output:'1. Priority decision\n2. Risk assessment\n3. Tradeoffs\n4. Escalations\n5. Executive summary'}
};
const agents=[
  {name:'Project Manager',desc:agentDefaults['Project Manager'].desc,match:i=>i.assignedAgent==='Project Manager'||['/define-project','/build-roadmap','/plan-week','/review-progress'].includes(i.claudeSkill)||/next|task|execute|build|launch/i.test(i.nextAction||'')},
  {name:'Project Shepherd',desc:agentDefaults['Project Shepherd'].desc,match:i=>i.assignedAgent==='Project Shepherd'||['/align-goals','/shepherd-team'].includes(i.claudeSkill)||/align|stakeholder|team|owner|client/i.test((i.goal||'')+' '+(i.blocker||''))},
  {name:'Tool Evaluator',desc:agentDefaults['Tool Evaluator'].desc,match:i=>i.assignedAgent==='Tool Evaluator'||i.claudeSkill==='/evaluate-tool'||/tool|stack|system|api|integration|supabase|github/i.test((i.toolStack||'')+' '+(i.title||''))},

];

function fillSelect(id,arr,keepFirst=false){const el=document.getElementById(id);if(!el)return;if(!keepFirst)el.innerHTML='';arr.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o)})}
function setSync(m,ok=true){const el=document.getElementById('syncStatus');el.className=ok?'sync-ok':'sync-bad';el.textContent=m}function getLane(s){return lanes.find(l=>l.name===s)||lanes[0]}function esc(v){return String(v||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function stamp(t){return{time:new Date().toLocaleString(),text:t}}
function toDbItem(i,includeAgentFields=true){const base={id:i.id,title:i.title,status:i.status,person:i.person||'',goal:i.goal||'',next_action:i.nextAction||'',blocker:i.blocker||'',sort_order:i.sortOrder||Date.now(),updated_at:new Date().toISOString(),notes:i.notes||'',links:i.links||'',subtasks:i.subtasks||[],history:i.history||[],project_type:i.projectType||'',success_criteria:i.successCriteria||'',priority:i.priority||'',claude_skill:i.claudeSkill||'',project_shepherd:i.projectShepherd||'',next_prompt:i.nextPrompt||'',learning_loop:i.learningLoop||'',tool_stack:i.toolStack||'',resource_need:i.resourceNeed||'',decision_needed:i.decisionNeeded||'',assigned_agent:i.assignedAgent||'',desired_output:i.desiredOutput||'',input_context:i.inputContext||'',ai_recommendation:i.aiRecommendation||'',ai_summary:i.aiSummary||'',ai_risk_assessment:i.aiRiskAssessment||'',ai_questions:i.aiQuestions||'',command_log:i.commandLog||[],due_date:i.dueDate||null};if(!includeAgentFields)return base;return{...base,action_needed:i.actionNeeded||'',action_type:i.actionType||'',action_owner:i.actionOwner||'',action_target:i.actionTarget||'',action_input:i.actionInput||'',action_output_expected:i.actionOutputExpected||'',action_status:i.actionStatus||'',action_result:i.actionResult||'',action_log:i.actionLog||[],last_updated_by_agent:i.lastUpdatedByAgent||'',last_progress_timestamp:i.lastProgressTimestamp||null,progress_count:i.progressCount||0,no_progress_run_count:i.noProgressRunCount||0}}
function fromDbItem(i){return{id:i.id,title:i.title,status:i.status,person:i.person||'',goal:i.goal||'',nextAction:i.next_action||'',blocker:i.blocker||'',sortOrder:i.sort_order||Date.now(),notes:i.notes||'',links:i.links||'',subtasks:i.subtasks||[],history:i.history||[],projectType:i.project_type||'',successCriteria:i.success_criteria||'',priority:i.priority||'Medium',claudeSkill:i.claude_skill||'',projectShepherd:i.project_shepherd||'',nextPrompt:i.next_prompt||'',learningLoop:i.learning_loop||'',toolStack:i.tool_stack||'',resourceNeed:i.resource_need||'',decisionNeeded:i.decision_needed||'',assignedAgent:i.assigned_agent||'',desiredOutput:i.desired_output||'',inputContext:i.input_context||'',aiRecommendation:i.ai_recommendation||'',aiSummary:i.ai_summary||'',aiRiskAssessment:i.ai_risk_assessment||'',aiQuestions:i.ai_questions||'',commandLog:i.command_log||[],actionNeeded:i.action_needed||'',actionType:i.action_type||'',actionOwner:i.action_owner||'',actionTarget:i.action_target||'',actionInput:i.action_input||'',actionOutputExpected:i.action_output_expected||'',actionStatus:i.action_status||'',actionResult:i.action_result||'',actionLog:i.action_log||[],lastUpdatedByAgent:i.last_updated_by_agent||'',lastProgressTimestamp:i.last_progress_timestamp||'',progressCount:i.progress_count||0,noProgressRunCount:i.no_progress_run_count||0,dueDate:i.due_date||''}}
async function loadItems(){if(!hasBackend){items=JSON.parse(localStorage.getItem('items')||'null')||demoItems;localStorage.setItem('items',JSON.stringify(items));setSync('Local mode',false);render();return}const{data,error}=await db.from('kanban_items').select('*').order('sort_order',{ascending:true});if(error){setSync('Sync error: '+error.message,false);return}if(!data.length){await db.from('kanban_items').insert(demoItems.map(toDbItem));return loadItems()}items=data.map(fromDbItem);setSync('Live synced');render()}
async function saveOne(item){if(!hasBackend){localStorage.setItem('items',JSON.stringify(items));render();return}let{error}=await db.from('kanban_items').upsert(toDbItem(item));if(error&&/action_|last_|progress_count|schema cache|column/i.test(error.message||'')){const fallback=await db.from('kanban_items').upsert(toDbItem(item,false));error=fallback.error;if(!error){setSync('Saved core fields; run agent SQL',false);return}}if(error)setSync('Save error: '+error.message,false);else setSync('Saved')}
function subscribeRealtime(){if(!hasBackend)return;db.channel('kanban-live').on('postgres_changes',{event:'*',schema:'public',table:'kanban_items'},()=>loadItems()).subscribe()}
function setVersion(){const now=new Date();const loaded=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;document.getElementById('version').textContent=`v${BUILD_VERSION} • loaded ${loaded}`;document.getElementById('versionHistory').textContent='Version history: '+VERSION_HISTORY.join(' | ');}
function formatDateInput(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function initCheckpoint(){const input=document.getElementById('checkpointDate');if(!input)return;let saved=localStorage.getItem('checkpointDate');if(!saved){const d=new Date();d.setDate(d.getDate()+30);d.setHours(17,0,0,0);saved=formatDateInput(d);localStorage.setItem('checkpointDate',saved)}input.value=saved;updateCheckpointCountdown();checkpointTimer=setInterval(updateCheckpointCountdown,1000)}
function saveCheckpointDate(){const input=document.getElementById('checkpointDate');if(!input)return;localStorage.setItem('checkpointDate',input.value);updateCheckpointCountdown()}
function updateCheckpointCountdown(){const el=document.getElementById('checkpointCountdown');const input=document.getElementById('checkpointDate');if(!el||!input||!input.value){if(el)el.textContent='Set a date';return}const diff=new Date(input.value).getTime()-Date.now();const past=diff<0;const ms=Math.abs(diff);const days=Math.floor(ms/86400000);const hours=Math.floor(ms%86400000/3600000);const mins=Math.floor(ms%3600000/60000);const secs=Math.floor(ms%60000/1000);el.textContent=past?`Past by ${days}d ${hours}h ${mins}m`:`${days}d ${hours}h ${mins}m ${secs}s`;el.className=past?'checkpoint-time sync-bad':'checkpoint-time'}
function getAgentItems(agentName){const agent=agents.find(a=>a.name===agentName);return agent?items.filter(agent.match):items}
function agentProgress(agentName){const matches=getAgentItems(agentName);const total=matches.length;const done=matches.filter(i=>i.status==='Done'||i.actionStatus==='Done').length;const blocked=matches.filter(isStuck).length;const active=matches.filter(i=>!['Done','Backlog'].includes(i.status)).length;const percent=total?Math.round(done/total*100):0;let status='Idle',tone='idle';if(blocked){status='Blocked';tone='blocked'}else if(total&&done===total){status='Complete';tone='complete'}else if(active){status='Active';tone='active'}return{total,done,blocked,active,percent,status,tone}}
function renderAgents(){const bar=document.getElementById('agentBar');if(!bar)return;bar.innerHTML=agents.map(agent=>{const matches=getAgentItems(agent.name);const state=agentProgress(agent.name);const active=activeAgent===agent.name?'active':'';const current=matches.find(i=>!['Done','Backlog'].includes(i.status))||matches[0];const label=state.total?`${state.done}/${state.total} done`:'0/0 done';return `<div class="agent ${active}"><div onclick="toggleAgentFilter('${agent.name}')"><b><span>${esc(agent.name)}</span><span>${matches.length}</span></b><div>${esc(agent.desc)}</div><div class="agent-status-row"><span class="agent-status ${state.tone}">${esc(state.status)}</span><span class="agent-progress-label">${esc(label)}</span></div><div class="agent-progress" aria-label="${esc(agent.name)} progress ${state.percent}%"><div class="agent-progress-fill ${state.tone}" style="width:${state.total?state.percent:8}%"></div></div><div class="${current?'agent-current':'agent-empty'}">${current?esc(current.title):'Nothing assigned'}</div></div><button onclick="copyAgentPrompt('${agent.name}')">Copy Prompt</button></div>`}).join('')}
function toggleAgentFilter(agentName){activeAgent=activeAgent===agentName?'':agentName;render()}
function buildPrompt(i,agentName=i.assignedAgent||'Project Manager'){const d=agentDefaults[agentName]||agentDefaults['Project Manager'];return `You are the ${agentName}.\n\nUse Claude Skill: ${i.claudeSkill||d.skill}\n\nCARD CONTEXT\nTitle: ${i.title||''}\nStatus: ${i.status||''}\nOwner: ${i.person||''}\nPriority: ${i.priority||''}\nProject Type: ${i.projectType||''}\nGoal Alignment: ${i.goal||''}\nSuccess Criteria: ${i.successCriteria||''}\nInput Context: ${i.inputContext||''}\nCurrent Next Action: ${i.nextAction||''}\nBlocker / Dependency: ${i.blocker||''}\nTool Stack: ${i.toolStack||''}\nResource Need: ${i.resourceNeed||''}\nDecision Needed: ${i.decisionNeeded||''}\nLearning Loop: ${i.learningLoop||''}\n\nACTION REQUEST\nAction Needed: ${i.actionNeeded||''}\nAction Type: ${i.actionType||''}\nAction Owner: ${i.actionOwner||''}\nAction Target: ${i.actionTarget||''}\nAction Input: ${i.actionInput||''}\nAction Output Expected: ${i.actionOutputExpected||''}\nAction Status: ${i.actionStatus||''}\nAction Result: ${i.actionResult||''}\n\nPROGRESS STATE\nLast Updated By Agent: ${i.lastUpdatedByAgent||''}\nLast Progress Timestamp: ${i.lastProgressTimestamp||''}\nProgress Count: ${i.progressCount||0}\n\nTASK\n${i.nextPrompt||'Review this initiative, update the action request, and move it toward a specific executable next step.'}\n\nRETURN FORMAT\n${i.desiredOutput||d.output}\n\nAlso return suggested updates for: status, nextAction, blocker, priority, decisionNeeded, actionNeeded, actionType, actionOwner, actionTarget, actionInput, actionOutputExpected, actionStatus, actionResult, aiSummary, aiRecommendation, aiRiskAssessment, aiQuestions.`}
async function copyPrompt(id,agentName){const i=items.find(x=>x.id===id);if(!i)return;await navigator.clipboard.writeText(buildPrompt(i,agentName));i.commandLog=[stamp('Prompt copied for '+(agentName||i.assignedAgent||'agent')),...(i.commandLog||[])];await saveOne(i);setSync('Prompt copied')}
function copyAgentPrompt(agentName){const i=getAgentItems(agentName).find(x=>x.status!=='Done')||getAgentItems(agentName)[0];if(!i){setSync('No active card for '+agentName,false);return}copyPrompt(i.id,agentName)}
function switchView(view){document.getElementById('kanbanView').classList.toggle('hidden',view!=='kanban');document.getElementById('tableView').classList.toggle('hidden',view!=='table');document.getElementById('activityView').classList.toggle('hidden',view!=='activity');document.getElementById('queueView').classList.toggle('hidden',view!=='queue');document.getElementById('statsView').classList.toggle('hidden',view!=='stats');document.getElementById('scriptsView').classList.toggle('hidden',view!=='scripts');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));render()}function toggleFocus(){focus=!focus;document.getElementById('app').classList.toggle('focus-on',focus)}
function filteredItems(){const s=document.getElementById('search').value.toLowerCase();const o=document.getElementById('ownerFilter').value;const agent=agents.find(a=>a.name===activeAgent);return items.filter(i=>JSON.stringify(i).toLowerCase().includes(s)&&(!o||i.person===o)&&(!agent||agent.match(i))).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0))}
function field(label,value,cls=''){return value?`<div class="card-row ${cls}"><b>${label}</b>${esc(value)}</div>`:''}
function progressLabel(i){const count=i.progressCount||0;const who=i.lastUpdatedByAgent?` by ${i.lastUpdatedByAgent}`:'';return count?`Progress ${count}${who}`:''}
function isStuck(i){return (i.noProgressRunCount||0)>=3||i.actionStatus==='Blocked'||i.status==='Stuck'}
function activityEntries(){return items.flatMap(i=>(i.actionLog||[]).map(h=>({card:i.title,agent:h.agent||i.lastUpdatedByAgent||i.assignedAgent||'Agent',field:h.field||'action',time:h.time||'',text:h.text||''}))).sort((a,b)=>new Date(b.time)-new Date(a.time)).slice(0,20)}
function renderActivityFeed(){const el=document.getElementById('activityFeed');if(!el)return;const rows=activityEntries();el.innerHTML=rows.length?rows.map(r=>`<div class="panel-card"><b>${esc(r.card)}</b><div>${esc(r.text)}</div><div class="panel-meta">${esc(r.agent)} updated ${esc(r.field)} • ${esc(r.time)}</div></div>`).join(''):'<div class="empty-state">No agent updates yet.</div>'}
function renderActionQueue(){const el=document.getElementById('actionQueue');if(!el)return;const active=filteredItems().filter(i=>i.actionNeeded&&i.actionStatus!=='Done');const groups=actionStatuses.filter(s=>active.some(i=>i.actionStatus===s));el.innerHTML=groups.length?`<div class="queue-grid">${groups.map(s=>{const rows=active.filter(i=>i.actionStatus===s);return `<div class="queue-group"><div class="queue-header"><span>${esc(s)}</span><span>${rows.length}</span></div><div class="queue-body">${rows.map(i=>`<div class="panel-card"><b>${esc(i.actionNeeded)}</b><div class="panel-meta">${esc(i.title)} • ${esc(i.actionOwner||'No owner')} • ${esc(i.actionType||'No type')}</div>${isStuck(i)?'<div class="sync-bad">Needs decision or unblock</div>':''}<button onclick="openDetails('${i.id}')">Open</button></div>`).join('')}</div></div>`}).join('')}</div>`:'<div class="empty-state">No open action requests.</div>'}
function rewardBadges(score){const badges=[];if(score.points>=25)badges.push('Momentum Maker');if(score.completed>=3)badges.push('Finisher');if(score.unblocked>=2)badges.push('Blocker Breaker');if(score.updates>=5)badges.push('Consistent Operator');return badges.length?badges:['Warming Up']}
function agentScores(){const map={};items.forEach(i=>{const agent=i.lastUpdatedByAgent||i.assignedAgent||i.actionOwner||'Unassigned';if(!map[agent])map[agent]={agent,points:0,updates:0,completed:0,unblocked:0};map[agent].points+=Number(i.progressCount||0)*3;map[agent].completed+=i.actionStatus==='Done'?1:0;map[agent].points+=i.actionStatus==='Done'?10:0;map[agent].unblocked+=i.status!=='Stuck'&&Number(i.noProgressRunCount||0)===0&&Number(i.progressCount||0)>0?1:0;(i.actionLog||[]).forEach(h=>{const a=h.agent||agent;if(!map[a])map[a]={agent:a,points:0,updates:0,completed:0,unblocked:0};map[a].updates+=1;map[a].points+=2})});agents.forEach(a=>{if(!map[a.name])map[a.name]={agent:a.name,points:0,updates:0,completed:0,unblocked:0}});return Object.values(map).sort((a,b)=>b.points-a.points||b.updates-a.updates)}
function kpis(){const active=items.filter(i=>i.status!=='Done').length;const openActions=items.filter(i=>i.actionNeeded&&i.actionStatus!=='Done').length;const doneActions=items.filter(i=>i.actionStatus==='Done').length;const stuck=items.filter(isStuck).length;const progress=items.reduce((n,i)=>n+Number(i.progressCount||0),0);const updates=activityEntries().length;return[{label:'Active Cards',value:active},{label:'Open Actions',value:openActions},{label:'Done Actions',value:doneActions},{label:'Stuck Signals',value:stuck},{label:'Progress Points',value:progress},{label:'Recent Updates',value:updates}]}
function renderStatsPanel(){const el=document.getElementById('statsPanel');if(!el)return;const scores=agentScores();el.innerHTML=`<div class="kpi-grid">${kpis().map(k=>`<div class="kpi-card"><div class="kpi-label">${esc(k.label)}</div><div class="kpi-value">${esc(k.value)}</div></div>`).join('')}</div><div class="panel-card"><b>Agent Leaderboard</b><div class="leaderboard">${scores.map((s,i)=>`<div class="leader-row"><div class="leader-rank">#${i+1}</div><div><b>${esc(s.agent)}</b><div class="panel-meta">${s.points} pts • ${s.updates} updates • ${s.completed} done • ${s.unblocked} unblocked</div><div class="reward-badges">${rewardBadges(s).map(b=>`<span class="reward-badge">${esc(b)}</span>`).join('')}</div></div><div class="kpi-value">${s.points}</div></div>`).join('')}</div></div>`}
function runnerBaseUrl(){return localStorage.getItem('scriptRunnerUrl')||'http://127.0.0.1:8787'}
function scriptLog(){try{return JSON.parse(localStorage.getItem('scriptRunLog')||'[]')}catch{return[]}}
function addScriptLog(level,title,message){const rows=[{time:new Date().toLocaleString(),level,title,message},...scriptLog()].slice(0,40);localStorage.setItem('scriptRunLog',JSON.stringify(rows));renderScriptConsole()}
function saveScriptRunnerUrl(){const input=document.getElementById('scriptRunnerUrl');if(!input)return;localStorage.setItem('scriptRunnerUrl',input.value.replace(/\/$/,''));addScriptLog('good','Runner URL saved',`Using ${input.value}`)}
function scriptUrl(path){return runnerBaseUrl().replace(/\/$/,'')+path}
async function runScriptNow(id){const script=scripts.find(s=>s.id===id);if(!script)return;addScriptLog('info',`${script.name} started`,'Sending a run request to the local runner.');try{const res=await fetch(scriptUrl(script.path),{method:'POST'});const data=await res.json().catch(()=>({message:'Runner returned a non-JSON response.'}));if(!res.ok)throw new Error(data.message||`Runner returned HTTP ${res.status}`);addScriptLog('good',`${script.name} finished`,data.message||`Processed ${data.processed||0} cards.`);await loadItems()}catch(e){addScriptLog('bad',`${script.name} did not run`,`${e.message}. Make sure the local runner server is running with npm run serve.`)}}
function renderScriptConsole(){const el=document.getElementById('scriptConsole');if(!el)return;const logs=scriptLog();el.innerHTML=`<div class="script-console"><div class="panel-card"><b>Runner Connection</b><div class="script-settings"><input id="scriptRunnerUrl" value="${esc(runnerBaseUrl())}" placeholder="http://127.0.0.1:8787"><button onclick="saveScriptRunnerUrl()">Save URL</button></div><div class="panel-meta">Start the local server from agency-agent-runner with npm run serve, then use Run now.</div></div>${scripts.map(s=>`<div class="panel-card"><b>${esc(s.name)}</b><div>${esc(s.description)}</div><div class="panel-meta">Endpoint: ${esc(s.path)} • Schedule: ${esc(s.schedule)}</div><button class="new-btn" onclick="runScriptNow('${s.id}')">Run now</button></div>`).join('')}<div class="panel-card"><b>Status Log</b><div class="script-log">${logs.length?logs.map(l=>`<div class="script-entry ${l.level==='good'?'good':l.level==='bad'?'bad':''}"><b>${esc(l.title)}</b><div>${esc(l.message)}</div><span>${esc(l.time)}</span></div>`).join(''):'<div class="empty-state">No script runs yet.</div>'}</div></div></div>`}
function renderHomePreviews(){const el=document.getElementById('homePreviews');if(!el)return;const top=agentScores()[0]||{agent:'No agent yet',points:0,updates:0};const key=kpis().filter(k=>['Open Actions','Stuck Signals','Progress Points'].includes(k.label));const last=scriptLog()[0];el.innerHTML=`<div class="home-preview-grid"><div class="panel-card"><b>Stats Snapshot</b><div class="kpi-grid">${key.map(k=>`<div class="kpi-card"><div class="kpi-label">${esc(k.label)}</div><div class="kpi-value">${esc(k.value)}</div></div>`).join('')}</div><div class="panel-meta">Top agent: ${esc(top.agent)} • ${top.points} pts • ${top.updates} updates</div><button onclick="switchView('stats')">Open Stats</button></div><div class="panel-card"><b>Script Runner</b><div class="panel-meta">Runner URL: ${esc(runnerBaseUrl())}</div><div>${last?esc(last.title):'No script runs yet.'}</div><div class="panel-meta">${last?esc(last.message):'Start the local server, then run scripts on demand.'}</div><button onclick="switchView('scripts')">Open Scripts</button></div></div>`}
function render(){renderAgents();const filtered=filteredItems();const board=document.getElementById('board');board.innerHTML='';lanes.forEach(l=>{const count=filtered.filter(i=>i.status===l.name).length;const col=document.createElement('div');col.className='lane';col.dataset.status=l.name;col.innerHTML=`<div class="lane-header" style="background:${l.color}"><span>${esc(l.name)}</span><span>${count}</span></div><div class="lane-body"></div>`;col.addEventListener('dragover',handleDragOver);col.addEventListener('dragleave',handleDragLeave);col.addEventListener('drop',handleDrop);const body=col.querySelector('.lane-body');filtered.filter(i=>i.status===l.name).forEach(item=>{const card=document.createElement('div');card.className='card';card.draggable=true;card.dataset.id=item.id;card.addEventListener('dragstart',handleDragStart);card.addEventListener('dragend',handleDragEnd);card.innerHTML=`<div class="card-title">${esc(item.title)}</div><div class="chips"><span class="chip">${esc(item.priority||'Medium')}</span><span class="chip">${esc(item.assignedAgent||'No agent')}</span><span class="chip">${esc(item.actionStatus||'No action')}</span></div>${field('Owner',item.person)}${field('Goal Alignment',item.goal)}${field('Next Action',item.nextAction)}${field('Action Needed',item.actionNeeded)}${field('Action Owner',item.actionOwner)}${field('Progress',progressLabel(item))}${isStuck(item)?field('Stuck Signal','Needs decision or unblock','sync-bad'):''}${field('Blocker / Dependency',item.blocker)}<div class="card-actions"><span class="pill" onclick="move('${item.id}',-1)">←</span><span class="pill" onclick="move('${item.id}',1)">→</span><select class="status-select" style="background:${getLane(item.status).color};color:white" onchange="changeStatus('${item.id}',this.value)">${lanes.map(s=>`<option value="${esc(s.name)}" ${s.name===item.status?'selected':''}>${esc(s.name)}</option>`).join('')}</select><span class="pill" onclick="openDetails('${item.id}')">Open</span><span class="pill" onclick="copyPrompt('${item.id}')">Copy Prompt</span><span class="pill" onclick="removeItem('${item.id}')">Delete</span></div>`;body.appendChild(card)});board.appendChild(col)});const tbody=document.getElementById('tableBody');tbody.innerHTML='';filtered.forEach(i=>{const tr=document.createElement('tr');tr.innerHTML=`<td><button onclick="openDetails('${i.id}')">Open</button> ${esc(i.title)}</td><td>${esc(i.status)}</td><td>${esc(i.assignedAgent)}</td><td>${esc(i.person)}</td><td>${esc(i.priority)}</td><td>${esc(i.claudeSkill)}</td><td>${esc(i.goal)}</td><td>${esc(i.nextAction)}</td><td>${esc(i.actionNeeded)}</td><td>${esc(progressLabel(i))}</td><td>${esc(i.blocker)}</td>`;tbody.appendChild(tr)});renderActivityFeed();renderActionQueue();renderStatsPanel();renderScriptConsole();renderHomePreviews()}
function handleDragStart(e){draggedCardId=e.currentTarget.dataset.id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',draggedCardId)}function handleDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.lane').forEach(l=>l.classList.remove('drag-over'))}function handleDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}function handleDragLeave(e){e.currentTarget.classList.remove('drag-over')}async function handleDrop(e){e.preventDefault();const lane=e.currentTarget;lane.classList.remove('drag-over');const id=e.dataTransfer.getData('text/plain')||draggedCardId;const item=items.find(i=>i.id===id);if(!item)return;item.status=lane.dataset.status;item.sortOrder=Date.now();item.history=[stamp('Moved to '+item.status),...(item.history||[])];await saveOne(item);draggedCardId=null;render()}
async function move(id,dir){const item=items.find(i=>i.id===id);if(!item)return;const idx=lanes.findIndex(l=>l.name===item.status);item.status=lanes[Math.max(0,Math.min(lanes.length-1,idx+dir))].name;item.sortOrder=Date.now();item.history=[stamp('Moved to '+item.status),...(item.history||[])];await saveOne(item);render()}async function changeStatus(id,status){const item=items.find(i=>i.id===id);if(!item)return;item.status=status;item.history=[stamp('Status changed to '+status),...(item.history||[])];await saveOne(item);render()}async function removeItem(id){items=items.filter(i=>i.id!==id);if(hasBackend)await db.from('kanban_items').delete().eq('id',id);else localStorage.setItem('items',JSON.stringify(items));render()}
function openModal(){document.getElementById('modal').showModal()}function closeModal(){document.getElementById('modal').close()}async function saveItem(e){e.preventDefault();const item={id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(),title:title.value,status:status.value,person:person.value,assignedAgent:assignedAgent.value,priority:priority.value,claudeSkill:claudeSkill.value,projectType:projectType.value,dueDate:dueDate.value,goal:goal.value,successCriteria:successCriteria.value,inputContext:inputContext.value,desiredOutput:desiredOutput.value,nextAction:nextAction.value,blocker:blocker.value,nextPrompt:nextPrompt.value,actionNeeded:actionNeeded.value,actionType:actionType.value,actionOwner:actionOwner.value,actionTarget:actionTarget.value,actionInput:actionInput.value,actionOutputExpected:actionOutputExpected.value,actionStatus:actionStatus.value,actionResult:'',actionLog:[],lastUpdatedByAgent:'',lastProgressTimestamp:'',progressCount:0,noProgressRunCount:0,notes:'',links:'',subtasks:[],history:[stamp('Card created')],commandLog:[],sortOrder:Date.now()};items.push(item);document.getElementById('modal').close();e.target.reset();await saveOne(item);render()}
function openDetails(id){const i=items.find(x=>x.id===id);if(!i)return;document.getElementById('drawerHost').innerHTML=`<aside class="drawer"><button onclick="closeDetails()">Close</button><h2>${esc(i.title)}</h2><div class="drawer-grid"><input id="dTitle" value="${esc(i.title)}"><select id="dStatus">${lanes.map(l=>`<option ${l.name===i.status?'selected':''}>${esc(l.name)}</option>`).join('')}</select><select id="dAssignedAgent">${agents.map(a=>`<option ${a.name===i.assignedAgent?'selected':''}>${esc(a.name)}</option>`).join('')}</select><select id="dPerson">${people.map(p=>`<option ${p===i.person?'selected':''}>${esc(p)}</option>`).join('')}</select><select id="dPriority"><option ${i.priority==='High'?'selected':''}>High</option><option ${i.priority==='Medium'?'selected':''}>Medium</option><option ${i.priority==='Low'?'selected':''}>Low</option></select><select id="dClaudeSkill">${skills.map(s=>`<option ${s===i.claudeSkill?'selected':''}>${esc(s)}</option>`).join('')}</select><input id="dProjectType" value="${esc(i.projectType)}" placeholder="Project type"><input id="dDueDate" type="date" value="${esc(i.dueDate)}"><textarea id="dGoal" placeholder="Goal alignment">${esc(i.goal)}</textarea><textarea id="dSuccess" placeholder="Success criteria">${esc(i.successCriteria)}</textarea><textarea id="dInputContext" placeholder="Input context / source notes">${esc(i.inputContext)}</textarea><textarea id="dDesiredOutput" placeholder="Desired output format">${esc(i.desiredOutput)}</textarea><textarea id="dNext" placeholder="Next action">${esc(i.nextAction)}</textarea><textarea id="dBlocker" placeholder="Blocker / dependency">${esc(i.blocker)}</textarea><textarea id="dPrompt" placeholder="Next Claude prompt">${esc(i.nextPrompt)}</textarea><textarea id="dLearning" placeholder="Learning loop">${esc(i.learningLoop)}</textarea><textarea id="dTools" placeholder="Tool stack">${esc(i.toolStack)}</textarea><textarea id="dResources" placeholder="Resource need">${esc(i.resourceNeed)}</textarea><textarea id="dDecision" placeholder="Decision needed">${esc(i.decisionNeeded)}</textarea><select id="dActionType">${actionTypes.map(v=>`<option ${v===i.actionType?'selected':''}>${esc(v)}</option>`).join('')}</select><select id="dActionOwner">${executionAgents.map(v=>`<option ${v===i.actionOwner?'selected':''}>${esc(v)}</option>`).join('')}</select><select id="dActionStatus">${actionStatuses.map(v=>`<option ${v===i.actionStatus?'selected':''}>${esc(v)}</option>`).join('')}</select><input id="dActionTarget" value="${esc(i.actionTarget)}" placeholder="Action target / repo / endpoint"><textarea id="dActionNeeded" placeholder="Action needed">${esc(i.actionNeeded)}</textarea><textarea id="dActionInput" placeholder="Action input">${esc(i.actionInput)}</textarea><textarea id="dActionOutput" placeholder="Action output expected">${esc(i.actionOutputExpected)}</textarea><textarea id="dActionResult" placeholder="Action result">${esc(i.actionResult)}</textarea><input id="dLastAgent" value="${esc(i.lastUpdatedByAgent)}" placeholder="Last updated by agent"><input id="dProgressCount" type="number" min="0" value="${esc(i.progressCount||0)}" placeholder="Progress count"><input id="dNoProgressCount" type="number" min="0" value="${esc(i.noProgressRunCount||0)}" placeholder="No-progress run count"><textarea id="dAiSummary" placeholder="AI Summary">${esc(i.aiSummary)}</textarea><textarea id="dAiRecommendation" placeholder="AI Recommendation">${esc(i.aiRecommendation)}</textarea><textarea id="dAiRisk" placeholder="AI Risk Assessment">${esc(i.aiRiskAssessment)}</textarea><textarea id="dAiQuestions" placeholder="Questions to Ask">${esc(i.aiQuestions)}</textarea><button onclick="copyPrompt('${i.id}')">Copy Structured Claude Prompt</button><textarea id="dNotes" placeholder="Notes">${esc(i.notes)}</textarea><textarea id="dLinks" placeholder="Links">${esc(i.links)}</textarea><button onclick="saveDetails('${i.id}')">Save Details</button><div class="history"><b>Action Log</b>${(i.actionLog||[]).slice(0,8).map(h=>`<div>${esc(h.time)} - ${esc(h.text)}</div>`).join('')}<br><b>Command Log</b>${(i.commandLog||[]).slice(0,8).map(h=>`<div>${esc(h.time)} - ${esc(h.text)}</div>`).join('')}<br><b>History</b>${(i.history||[]).slice(0,8).map(h=>`<div>${esc(h.time)} - ${esc(h.text)}</div>`).join('')}</div></div></aside>`}
function closeDetails(){document.getElementById('drawerHost').innerHTML=''}async function saveDetails(id){const i=items.find(x=>x.id===id);if(!i)return;i.title=dTitle.value;i.status=dStatus.value;i.assignedAgent=dAssignedAgent.value;i.person=dPerson.value;i.priority=dPriority.value;i.claudeSkill=dClaudeSkill.value;i.projectType=dProjectType.value;i.dueDate=dDueDate.value;i.goal=dGoal.value;i.successCriteria=dSuccess.value;i.inputContext=dInputContext.value;i.desiredOutput=dDesiredOutput.value;i.nextAction=dNext.value;i.blocker=dBlocker.value;i.nextPrompt=dPrompt.value;i.learningLoop=dLearning.value;i.toolStack=dTools.value;i.resourceNeed=dResources.value;i.decisionNeeded=dDecision.value;i.actionType=dActionType.value;i.actionOwner=dActionOwner.value;i.actionStatus=dActionStatus.value;i.actionTarget=dActionTarget.value;i.actionNeeded=dActionNeeded.value;i.actionInput=dActionInput.value;i.actionOutputExpected=dActionOutput.value;i.actionResult=dActionResult.value;i.lastUpdatedByAgent=dLastAgent.value;i.progressCount=Number(dProgressCount.value||0);i.noProgressRunCount=Number(dNoProgressCount.value||0);i.lastProgressTimestamp=i.progressCount?new Date().toISOString():i.lastProgressTimestamp;i.aiSummary=dAiSummary.value;i.aiRecommendation=dAiRecommendation.value;i.aiRiskAssessment=dAiRisk.value;i.aiQuestions=dAiQuestions.value;i.notes=dNotes.value;i.links=dLinks.value;i.history=[stamp('Details updated'),...(i.history||[])];await saveOne(i);closeDetails();render()}
function runTests(){const r=document.getElementById('testResult');try{console.assert(lanes.length===6,'six lanes');console.assert(!lanes.some(l=>l.name==='Blank'),'blank removed');console.assert(agents.length===4,'agents loaded');console.assert(actionTypes.length>0,'action types loaded');console.assert(typeof buildPrompt==='function','prompt builder loaded');console.assert(typeof updateCheckpointCountdown==='function','checkpoint timer loaded');r.className='test-pass';r.textContent='Tests passed'}catch(e){r.className='test-fail';r.textContent='Tests failed';console.error(e)}}
initSelects();setVersion();initCheckpoint();loadItems();subscribeRealtime();runTests();
</script>
